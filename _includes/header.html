<header>
    <nav class="nav-container">
        <a href="/" class="nav-logo">
            <img
                src="{{ '/assets/images/benji-icon.svg' | relative_url }}"
                alt="Daily Benji"
                class="logo-icon"
            />
            <span class="logo-text">Daily Benji</span>
        </a>

        <!-- Mobile menu button -->
        <button class="mobile-menu-btn" aria-label="Menu">
            <span></span>
            <span></span>
            <span></span>
        </button>

        <!-- Navigation links -->
        <ul class="nav-links" id="navLinks">
            <li><a href="/features">Features</a></li>
            <li><a href="/privacy">Privacy</a></li>
            <li><a href="/why">Why</a></li>
            <li class="mobile-only">
                {% if site.signups_open %}
                <a href="/get-started" class="nav-cta-mobile">Get Started</a>
                {% else %}
                <span class="coming-soon-badge">Coming July 2026</span>
                {% endif %}
            </li>
        </ul>

        <!-- Desktop CTA button -->
        {% if site.signups_open %}
        <a href="/get-started" class="nav-cta desktop-only">Get Started</a>
        {% else %}
        <span class="coming-soon-badge desktop-only">Coming July 2026</span>
        {% endif %}
    </nav>
</header>

<!-- Menu behavior lives in /assets/js/site.js (loaded site-wide, no inline JS) -->
